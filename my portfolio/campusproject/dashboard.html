<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>

body{
margin:0;
font-family:Arial;
background:#e6e6e6;
}

/* Navbar */

.navbar{
background:#34495e;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:15px;
text-decoration:none;
font-size:18px;
}

.navbar a:hover{
color:yellow;
}

/* Blue profile section */

.hero{
background:#3a8ec1;
color:white;
text-align:center;
padding:60px;
}

.profile{
background:white;
color: black;
display:inline-block;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
margin-top:20px;
}

.profile p{
font-size:18px;
margin:5px;
}

/* Features */

.features{
display:flex;
justify-content:center;
gap:40px;
padding:50px;
}

.feature-box{
background:white;
padding:25px;
width:250px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.footer{
background:#34495e;
color:white;
text-align:center;
padding:15px;
}
.feature-box{
background:white;
padding:25px;
width:250px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px gray;
text-decoration:none;
color:black;
transition:0.3s;
}

.feature-box:hover{
transform:scale(1.05);
}


</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">
<a href="dashboard.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="home1.html" onclick="logout()">Logout</a>
</div>

<!-- Blue section with profile -->

<div class="hero">

<h1>Welcome to Campus Lost & Found</h1>

<div class="profile">
<p><b>Name:</b> <span id="userName"></span></p>
<p><b>Email:</b> <span id="userEmail"></span></p>
</div>

</div>

<!-- Features -->
<div class="features">

<a href="report-lost.html" class="feature-box">
<h2>Report Lost Item</h2>
<p>Students can report items they have lost in the campus.</p>
</a>

<a href="report-found.html" class="feature-box">
<h2>Report Found Item</h2>
<p>Students can upload items they found to help others.</p>
</a>

<a href="search.html" class="feature-box">
<h2>Search Items</h2>
<p>Search and find lost items easily.</p>
</a>

</div>

<div class="footer">
© 2026 Campus Lost & Found
</div>

<script>

let user = JSON.parse(localStorage.getItem("user"));

document.getElementById("userName").innerText = user.name;
document.getElementById("userEmail").innerText = user.email;

function logout(){
localStorage.removeItem("user");
window.location.href="login.html";
}

</script>

</body>
</html>
