<!DOCTYPE html>
<html>
<head>
<title>Search Items</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
}

.navbar{
background:#2c3e50;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:15px;
text-decoration:none;
font-size:18px;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
}

.search-box{
text-align:center;
margin-bottom:40px;
}

.search-box input{
padding:10px;
width:300px;
border-radius:5px;
border:1px solid #ccc;
}

.search-box button{
padding:10px 15px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.section-title{
margin-top:40px;
}

.items{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
width:220px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

</style>

</head>

<body>

<div class="navbar">
<a href="dashboard.html">Dashboard</a>
<a href="report-lost.html">Report Lost</a>
<a href="report-found.html">Report Found</a>
</div>

<div class="container">

<div class="search-box">
<h2>Search Lost or Found Items</h2>

<input type="text" placeholder="Enter item name">
<button>Search</button>

</div>

<h2 class="section-title">Lost Items</h2>
<div class="items" id="lostItems"></div>

<h2 class="section-title">Found Items</h2>
<div class="items" id="foundItems"></div>

</div>

</body>
</html>
