<!DOCTYPE html>
<html>
<head>
<title>Report Lost Item</title>
<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.navbar{
background:#34495e;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:15px;
text-decoration:none;
font-size:18px;
}

.container{
width:400px;
margin:auto;
margin-top:50px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#3498db;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<div class="navbar">
<a href="dashboard.html">Home</a>
</div>

<div class="container">

<h2>Report Lost Item</h2>

<form>

<input type="text" placeholder="Item Name" required>

<textarea placeholder="Item Description"></textarea>

<input type="text" placeholder="Location Lost">

<input type="date">

<input type="file">

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
